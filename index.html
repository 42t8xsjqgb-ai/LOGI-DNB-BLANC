        const calculateTimeSlots = (timeRangeStr) => {
            if (!timeRangeStr) return [];
            const parts = timeRangeStr.split('-').map(s => s.trim());
            if (parts.length !== 2) return [{ start: "??:??", end: "??:??", label: timeRangeStr }];

            let current = parseTime(startStr); const end = parseTime(endStr); const slots = [];

                                                <td className="px-2 py-2"><input type="text" value={t.lastname} onChange={(e) => handleUpdateTeacherField(t.id, 'lastname', e.target.value.toUpperCase())} className="w-full bg-transparent border-b border-transparent focus:border-sky-500 focus:outline-none transition-colors font-bold text-slate-700 text-xs uppercase"/></td>
                                                <td className="px-2 py-2"><input type="text" value={t.firstname} onChange={(e) => handleUpdateTeacherField(t.id, 'firstname', e.target.value)} className="w-full bg-transparent border-b border-transparent focus:border-sky-500 focus:outline-none transition-colors font-medium text-slate-700 text-xs capitalize"/></td>
                                                <td className="px-2 py-2"><input type="text" value={t.subject} onChange={(e) => handleUpdateTeacherField(t.id, 'subject', e.target.value)} className="w-full bg-transparent border-b border-transparent focus:border-sky-500 focus:outline-none transition-colors font-medium text-slate-700 text-xs"/></td>
                                                <td className="px-2 py-2 text-right"><button onClick={() => handleDeleteTeacher(t.id)} className="text-rose-400 hover:text-rose-600 p-1 rounded-full hover:bg-rose-50 transition-colors"><Trash2 className="w-4 h-4" /></button></td>
                                            </tr>
                                        )) : (
                                            <tr><td colSpan="5" className="text-center py-4 text-slate-400 italic">Aucun professeur configuré.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>

                            <div className="mt-auto pt-4 border-t border-slate-100 bg-slate-50 p-4 rounded-lg flex items-end gap-2">
                                <div className="flex-grow grid grid-cols-4 gap-2">
                                    <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Civ.</label><select value={newTeacher.civ} onChange={(e) => setNewTeacher({...newTeacher, civ: e.target.value})} className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-orange-200 outline-none text-xs"><option value="M.">M.</option><option value="Mme">Mme</option></select></div>
                                    <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nom *</label><input type="text" value={newTeacher.lastname} onChange={(e) => setNewTeacher({...newTeacher, lastname: e.target.value.toUpperCase()})} className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-orange-200 outline-none text-xs" placeholder="Ex: DUPONT" /></div>
                                    <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Prénom</label><input type="text" value={newTeacher.firstname} onChange={(e) => setNewTeacher({...newTeacher, firstname: e.target.value})} className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-orange-200 outline-none text-xs" placeholder="Ex: Jean" /></div>
                                    <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Discipline *</label><input type="text" value={newTeacher.subject} onChange={(e) => setNewTeacher({...newTeacher, subject: e.target.value})} className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-orange-200 outline-none text-xs" placeholder="Ex: Maths" /></div>
                                </div>
                                <Button onClick={handleAddTeacher} icon={Plus} className="h-[34px] bg-orange-500 hover:bg-orange-600 text-white border-0 shadow-orange-100 text-xs px-2">Ajouter</Button>
                            </div>
                        </Card>
                    </div>
                </div>
            );

            const renderRepartition = () => {
                const studentsWithoutRoom = students.filter(s => !s.roomId);
                const studentsWithRoom = students.filter(s => s.roomId);
                
                return (
                    <div className="space-y-6 animate-fade-in">
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex gap-4">
                                <div className="flex items-center space-x-2 bg-slate-100 p-1 rounded-lg">
                                    <button onClick={() => setIsAnonymityLocked(!isAnonymityLocked)} className={`p-2 rounded-md transition-colors ${isAnonymityLocked ? 'bg-white shadow text-emerald-600' : 'text-slate-500'}`} title={isAnonymityLocked ? "Anonymat Verrouillé" : "Déverrouillé"}>{isAnonymityLocked ? <Lock className="w-5 h-5" /> : <Unlock className="w-5 h-5" />}</button>
                                    <Button onClick={regenerateAnonymity} disabled={isAnonymityLocked} variant="secondary" className="text-xs">Générer Anonymat</Button>
                                </div>
                                <Button onClick={distributeStudents} icon={RefreshCw}>Répartition Auto</Button>
                                <Button onClick={resetDistribution} variant="danger" icon={Trash2}>Tout Vider</Button>
                            </div>
                            <div className="flex items-center gap-4 text-sm text-slate-600">
                                <span className="flex items-center"><div className="w-3 h-3 rounded-full bg-emerald-500 mr-2"></div>Placés: <strong>{studentsWithRoom.length}</strong></span>
                                <span className="flex items-center"><div className="w-3 h-3 rounded-full bg-rose-500 mr-2"></div>En attente: <strong>{studentsWithoutRoom.length}</strong></span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6 h-[600px]">
                            <div className="lg:col-span-1 bg-white rounded-xl shadow-sm border border-slate-100 flex flex-col overflow-hidden">
                                <div className="p-3 border-b border-slate-100 bg-slate-50 font-bold text-slate-700 flex justify-between">
                                    <span>Élèves sans salle</span><span className="bg-rose-100 text-rose-600 px-2 rounded-full text-xs flex items-center">{studentsWithoutRoom.length}</span>
                                </div>
                                <div className="flex-grow overflow-y-auto p-2 space-y-2">
                                    {studentsWithoutRoom.map(student => {
                                        const hasAH = student.aideHumaineRole || (student.aideHumaine && Object.values(student.aideHumaine).some(a => a.role));
                                        return (
                                        <div key={student.id} draggable onDragStart={(e) => handleDragStart(e, student.id)} onDoubleClick={() => setEditingStudent(student)} className="bg-white border border-slate-200 p-3 rounded-lg shadow-sm hover:shadow-md cursor-grab active:cursor-grabbing border-l-4 border-l-slate-400 group">
                                            <div className="flex justify-between items-start"><div className="font-bold text-slate-800 text-sm">{student.lastname} {student.firstname}</div><button onClick={(e) => { e.stopPropagation(); setEditingStudent(student); }} className="text-sky-600 bg-sky-50 hover:bg-sky-100 p-1.5 rounded-md transition-colors" title="Éditer le dossier"><Edit3 className="w-4 h-4" /></button></div>
                                            <div className="flex justify-between items-center mt-1"><span className="text-xs text-slate-500 bg-slate-100 px-1 rounded">{student.class}</span><div className="flex gap-1">{student.isTT && <span className="text-[10px] bg-amber-100 text-amber-700 px-1 rounded font-bold">TT</span>}{student.aesh && <span className="text-[10px] bg-purple-100 text-purple-700 px-1 rounded font-bold" title={student.aesh}>AESH</span>}{hasAH && <span className="text-[10px] bg-sky-100 text-sky-700 px-1 rounded font-bold" title="Aide Humaine">AH</span>}</div></div>
                                        </div>
                                    )})}
                                </div>
                            </div>

                            <div className="lg:col-span-3 bg-slate-50 rounded-xl border border-slate-200 p-4 overflow-y-auto">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {rooms.map(room => {
                                        const occupancy = getRoomOccupancy(room.id); const percentage = Math.round((occupancy / room.capacity) * 100); const isFull = occupancy >= room.capacity; const roomStudents = students.filter(s => s.roomId === room.id);
                                        return (
                                            <div key={room.id} onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={(e) => handleDrop(e, room.id)} className={`bg-white rounded-xl border-2 transition-all ${isFull ? 'border-slate-200' : 'border-dashed border-slate-300 hover:border-sky-400 hover:bg-sky-50'} drop-zone flex flex-col h-64`}>
                                                <div className="p-3 border-b border-slate-100 flex justify-between items-center bg-white rounded-t-xl"><div><h4 className="font-bold text-slate-800">{room.name}</h4><div className="text-xs text-slate-500">{occupancy} / {room.capacity}</div></div><div className={`w-10 h-10 rounded-full flex items-center justify-center text-xs font-bold ${isFull ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}`}>{percentage}%</div></div>
                                                <div className="flex-grow overflow-y-auto p-2 space-y-1 bg-slate-50/50">
                                                    {roomStudents.map(s => (
                                                        <div key={s.id} onDoubleClick={() => setEditingStudent(s)} className="text-xs bg-white border border-slate-200 p-1.5 rounded flex justify-between items-center group cursor-pointer" title="Double-clic pour éditer">
                                                            <span className="truncate max-w-[120px]">{s.lastname} {s.firstname}</span>
                                                            <div className="flex gap-1.5 items-center"><button onClick={(e) => { e.stopPropagation(); setEditingStudent(s); }} className="text-sky-600 bg-sky-50 hover:bg-sky-100 p-1 rounded transition-colors" title="Éditer"><Edit3 className="w-3.5 h-3.5" /></button><button onClick={(e) => { e.stopPropagation(); executeAssignment(s.id, null); }} className="text-rose-400 hover:text-white hover:bg-rose-500 p-1 rounded opacity-0 group-hover:opacity-100 transition-all" title="Retirer"><Trash2 className="w-3.5 h-3.5" /></button></div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderCorrection = () => {
                const currentAssignments = selectedCorrectionSubject ? (teacherAssignments[selectedCorrectionSubject.id] || []) : [];
                
                const getVisibleTeachers = () => {
                    if (!selectedCorrectionSubject) return [];
                    let filtered = teachers;
                    if (!forceAllTeachersCorrection) filtered = teachers.filter(t => isTeacherForSubject(t, selectedCorrectionSubject));
                    return [...filtered].sort((a, b) => {
                        const isSubA = isTeacherForSubject(a, selectedCorrectionSubject); const isSubB = isTeacherForSubject(b, selectedCorrectionSubject);
                        if (isSubA && !isSubB) return -1; if (!isSubA && isSubB) return 1; return a.lastname.localeCompare(b.lastname);
                    });
                };
                const visibleTeachers = getVisibleTeachers();

                return (
                    <div className="space-y-6 animate-fade-in">
                        <Card title="Répartition de la Correction" icon={CheckCircle}>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="space-y-4">
                                    <label className="block text-sm font-bold text-slate-700">1. Choisir l'Épreuve</label>
                                    <select className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-sky-200 outline-none" onChange={(e) => handleSubjectSelectForCorrection(e.target.value)} value={selectedCorrectionSubject?.id || ''}>
                                        <option value="">-- Sélectionner --</option>{subjects.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </select>
                                    {selectedCorrectionSubject && <div className="bg-sky-50 p-3 rounded border border-sky-100 text-sm text-sky-800"><strong>{students.filter(s => s.anonymousId).length}</strong> copies à corriger.</div>}
                                </div>

                                <div className="md:col-span-2 space-y-4">
                                    <div className="flex justify-between items-center">
                                        <label className="block text-sm font-bold text-slate-700">2. Sélectionner les Correcteurs</label>
                                        <label className="flex items-center space-x-2 text-xs text-slate-500 cursor-pointer"><input type="checkbox" checked={forceAllTeachersCorrection} onChange={() => setForceAllTeachersCorrection(!forceAllTeachersCorrection)} className="rounded text-sky-500 focus:ring-sky-400"/><span>Afficher tous les professeurs</span></label>
                                    </div>
                                    
                                    {selectedCorrectionSubject ? (
                                        <div className="bg-white border border-slate-200 rounded p-3 h-60 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 gap-2">
                                            {visibleTeachers.length > 0 ? visibleTeachers.map(t => {
                                                const isSubjectTeacher = isTeacherForSubject(t, selectedCorrectionSubject);
                                                return (
                                                    <label key={t.id} className={`flex items-center space-x-2 text-sm cursor-pointer hover:bg-slate-50 p-2 rounded border ${isSubjectTeacher ? 'border-emerald-200 bg-emerald-50/30' : 'border-transparent'}`}>
                                                        <input type="checkbox" checked={selectedTeachersForCorrection.includes(t.id)} onChange={() => { setSelectedTeachersForCorrection(prev => prev.includes(t.id) ? prev.filter(id => id !== t.id) : [...prev, t.id]); }} className="rounded text-sky-500 focus:ring-sky-400"/>
                                                        <div className="flex flex-col"><span className={isSubjectTeacher ? "font-semibold text-emerald-800" : ""}>{t.lastname} {t.firstname}</span><span className="text-[10px] text-slate-400">{t.subject}</span></div>
                                                    </label>
                                                );
                                            }) : (<div className="text-slate-400 italic col-span-2 text-center py-4">Aucun professeur trouvé.</div>)}
                                        </div>
                                    ) : <div className="text-slate-400 italic p-4 border border-dashed rounded text-center">En attente de sélection d'épreuve...</div>}
                                    <Button onClick={distributeCopies} disabled={!selectedCorrectionSubject || selectedTeachersForCorrection.length === 0} className="w-full">Calculer les Lots</Button>
                                </div>
                            </div>

                            {currentAssignments.length > 0 && (
                                <div className="mt-8">
                                    <h4 className="font-bold text-slate-700 mb-4 flex justify-between items-center"><span>3. Lots Attribués</span><Button onClick={() => generatePDF('listes_correction_detail')} variant="secondary" icon={Printer} className="text-xs">Imprimer Listes de Contrôle</Button></h4>
                                    <div className="overflow-x-auto border border-slate-200 rounded-lg">
                                        <table className="w-full text-sm text-left"><thead className="bg-slate-50 text-slate-700 font-bold border-b border-slate-200"><tr><th className="p-3">Correcteur</th><th className="p-3 w-24">Nb Copies</th><th className="p-3">Premier N°</th><th className="p-3">Dernier N°</th></tr></thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {currentAssignments.map((assign, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-50"><td className="p-3 font-medium text-slate-800">{assign.teacherName}</td><td className="p-3"><input type="number" value={assign.count} onChange={(e) => updateManualAssignment(idx, 'count', e.target.value)} className="w-16 p-1 border rounded text-center focus:ring-2 focus:ring-sky-200 outline-none"/></td><td className="p-3 font-mono text-slate-500">{assign.startAnonym}</td><td className="p-3 font-mono text-slate-500">{assign.endAnonym}</td></tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </Card>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <ConfirmationModal isOpen={modalConfig.isOpen} title={modalConfig.title} message={modalConfig.message} onConfirm={handleModalConfirm} onCancel={closeModal} />
                    <InputModal isOpen={inputModalConfig.isOpen} title={inputModalConfig.title} message={inputModalConfig.message} defaultValue={inputModalConfig.defaultValue} onConfirm={inputModalConfig.onConfirm} onCancel={closeInputModal} />
                    <StudentProfileModal student={editingStudent} subjects={subjects} teachers={teachers} isOpen={!!editingStudent} onClose={() => setEditingStudent(null)} onSave={handleSaveStudentProfile} />

                    <header className="bg-gradient-to-r from-cyan-500 to-blue-600 shadow-md sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center">
                                <School className="w-6 h-6 text-white mr-3" />
                                <h1 className="text-xl text-white flex items-center hidden sm:flex">
                                    <span className="text-cyan-200 font-extrabold tracking-tight">PERDIR</span><span className="font-light tracking-wide">FORMANCE</span>
                                    <span className="opacity-50 mx-3">|</span>
                                    <span className="font-bold">LOGI-DNB BLANC V15</span>
                                </h1>
                                <h1 className="text-xl font-bold text-white sm:hidden">LOGI-DNB V15</h1>
                            </div>
                            <div className="text-sm text-sky-100 hidden md:flex flex-col items-end">
                                <div className="font-medium capitalize text-[13px]">
                                    {now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })} - {now.toLocaleTimeString('fr-FR')}
                                </div>
                                <div className="text-[10px] opacity-80 flex items-center bg-black/10 px-2 py-0.5 rounded mt-0.5">
                                    <Save className="w-3 h-3 mr-1" /> 
                                    Sauvegarde auto : {lastSaved ? lastSaved.toLocaleTimeString('fr-FR') : 'En attente'}
                                </div>
                            </div>
                        </div>
                    </header>
                    
                    <div className="bg-white border-b shadow-sm"><div className="max-w-7xl mx-auto px-4"><nav className="-mb-px flex space-x-8 overflow-x-auto custom-scrollbar">
                        {[
                            { id: 'config', label: 'Accueil', icon: Settings },
                            { id: 'data', label: 'Import', icon: Upload },
                            { id: 'repartition', label: 'Répartition', icon: Users },
                            { id: 'surveillance', label: 'Salles', icon: Eye },
                            { id: 'annexes', label: 'Missions Annexes', icon: Briefcase },
                            { id: 'secretariat', label: 'Secrétariat', icon: Archive },
                            { id: 'correction', label: 'Correction', icon: CheckCircle },
                            { id: 'documents', label: 'Documents', icon: FileText },
                            { id: 'help', label: 'Aides', icon: HelpCircle }
                        ].map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`py-4 px-3 border-b-2 font-medium text-sm flex items-center whitespace-nowrap transition-colors ${activeTab === tab.id ? 'border-sky-500 text-sky-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>
                                <tab.icon className={`w-4 h-4 mr-2 ${activeTab === tab.id ? 'text-sky-500' : 'text-slate-400'}`} />
                                {tab.label}
                            </button>
                        ))}
                    </nav></div></div>
                    <main className="flex-grow max-w-7xl w-full mx-auto px-4 py-8">
                        {notification && <div className="fixed bottom-6 right-6 p-4 rounded-xl shadow-xl bg-emerald-500 text-white z-50 flex items-center"><CheckCircle className="w-5 h-5 mr-2"/> {notification.msg}</div>}
                        {activeTab === 'config' && renderConfig()}
                        {activeTab === 'data' && renderData()}
                        {activeTab === 'repartition' && renderRepartition()}
                        {activeTab === 'surveillance' && <SurveillancePanel subjects={subjects} rooms={rooms} teachers={teachers} students={students} assignments={surveillanceAssignments} onAssignmentChange={(k, v) => setSurveillanceAssignments(prev => ({...prev, [k]: v}))} schoolConfig={schoolConfig} mode={surveillanceMode} setMode={setSurveillanceMode} />}
                        {activeTab === 'annexes' && <AnnexesPanel subjects={subjects} rooms={rooms} teachers={teachers} corridorAssignments={corridorAssignments} verifierAssignments={verifierAssignments} reserveAssignments={reserveAssignments} onCorridorChange={(k, v) => setCorridorAssignments(prev => ({...prev, [k]: v}))} onVerifierChange={(k, v) => setVerifierAssignments(prev => ({...prev, [k]: v}))} onReserveChange={(k, v) => setReserveAssignments(prev => ({...prev, [k]: v}))} />}
                        {activeTab === 'secretariat' && <SecretariatPanel subjects={subjects} rooms={rooms} teachers={teachers} assignments={secretariatAssignments} onAssignmentChange={(sid, data) => setSecretariatAssignments(prev => ({...prev, [sid]: data}))} />}
                        {activeTab === 'correction' && renderCorrection()}
                        {activeTab === 'documents' && renderDocuments()}
                        {activeTab === 'help' && <HelpPanel />}
                    </main>
                    <footer className="bg-white border-t py-8 text-center text-slate-400 text-sm">LOGI-DNB BLANC V15 proposé par Yannis CHRISTON à l'aide de l'IA Générative</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
